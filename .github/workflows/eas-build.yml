name: EAS Build & Draft Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  CI: true
  EXPO_NO_TELEMETRY: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  eas-build-and-release:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      # 🚀 FIX: Increase memory limits for Node and Gradle to prevent OutOfMemory crashes
      NODE_OPTIONS: "--max-old-space-size=4096"
      GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx4g -XX:MaxMetaspaceSize=1g'"
      _JAVA_OPTIONS: "-XX:MaxMetaspaceSize=1g"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Get Version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Verify EAS Authentication
        run: |
          echo "Verifying EAS login..."
          eas whoami

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Android APK (Local/Free)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APK_NAME="DelhiMetro-v${VERSION}.apk"
          
          echo "🏗️ Starting local EAS build for Android APK..."
          
          # Disable strict bash error checking temporarily to capture output
          set +e
          eas build --platform android --profile release --local --non-interactive --output "$APK_NAME"
          EXIT_CODE=$?
          set -e
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Local EAS build failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          
          echo "apk_name=$APK_NAME" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_ENV
          echo "✅ Build completed successfully! APK is ready: $APK_NAME"

      - name: Get Latest Commit Message
        id: commit_msg
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$COMMIT_MSG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Draft GitHub Release (Pending Admin Review)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 Creating DRAFT release (pending admin review)..."
          gh release create "v${{ env.version }}" \
            "${{ env.apk_name }}" \
            --title "🚀 Delhi Metro App Update v${{ env.version }}" \
            --notes "## 🚇 Delhi Metro v${{ env.version }}
          **Status:** ⏳ Pending Admin Review
          
          ### ✨ What's New in this Update?
          ${{ env.CHANGELOG }}
          
          ### 📦 Build & Technical Details
          - **Platform:** Android (APK)
          - **Build Profile:** Release
          - **Version Code:** v${{ env.version }}
          - **Compiler:** EAS Build (Local CI)
          
          ### 🛠️ For Admins (Approval Process)
          1. Download and test the \`${{ env.apk_name }}\` attached below.
          2. If approved: Click **Edit** → uncheck **Set as a pre-release** → click **Publish release**.
          3. Publishing this release will finalize the update.
          
          ---
          *Automated CI/CD via GitHub Actions*" \
            --draft
          
          echo "✅ Draft release created. Waiting for admin to publish it."