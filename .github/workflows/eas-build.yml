name: EAS Build & Draft Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  CI: true
  EXPO_NO_TELEMETRY: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  eas-build-and-release:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Get Version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Verify EAS Authentication
        run: |
          echo "Verifying EAS login..."
          eas whoami
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Android APK (Local/Free)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APK_NAME="DelhiMetro-v${VERSION}.apk"
          
          echo "đźŹ—ď¸Ź Starting local EAS build for Android APK..."
          
          # Disable strict bash error checking temporarily to capture output
          set +e
          eas build --platform android --profile release --local --non-interactive --output "$APK_NAME"
          EXIT_CODE=$?
          set -e
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "âťŚ Local EAS build failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          
          echo "apk_name=$APK_NAME" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_ENV
          echo "âś… Build completed successfully! APK is ready: $APK_NAME"
      - name: Create Draft GitHub Release (Pending Admin Review)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "đź“¦ Creating DRAFT release (pending admin review)..."
          gh release create "v${{ env.version }}" \
            "${{ env.apk_name }}" \
            --title "Release v${{ env.version }}" \
            --notes "## đźš‡ Delhi Metro v${{ env.version }}
          **Status:** âŹł Pending admin review
          Built with EAS Build (Expo Application Services).
          
          ### For Admins
          - Review the APK attached below
          - Click **Edit** â†’ uncheck **Set as a pre-release** â†’ click **Publish release** to approve
          - This will automatically trigger the database update
          
          ---
          *Automated CI/CD via EAS Build*" \
            --draft
          
          echo "âś… Draft release created. Waiting for admin to publish it."