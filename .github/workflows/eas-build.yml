name: EAS Build & Draft Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  CI: true
  EXPO_NO_TELEMETRY: true

jobs:
  eas-build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create .env file
        run: |
          cat << 'EOF' > .env
          ${{ secrets.ENV_FILE }}
          EOF

      - name: Get Version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build APK (Local on GitHub Runner)
        run: |
          echo "🏗️ Starting EAS build for Android APK on GitHub runner..."
          eas build --platform android --profile release --local --output ./DelhiMetro-v${{ steps.version.outputs.version }}.apk

      - name: Create Draft GitHub Release (Pending Admin Review)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APK_NAME="DelhiMetro-v${VERSION}.apk"
          
          echo "📦 Creating DRAFT release (pending admin review)..."
          gh release create "v${VERSION}" \
            "$APK_NAME" \
            --title "Release v${VERSION}" \
            --notes "## 🚇 Delhi Metro v${VERSION}

          **Status:** ⏳ Pending admin review

          Built directly on GitHub Actions (Local Build).
          
          ### For Admins
          - Review the APK attached below
          - Click **Edit** → uncheck **Set as a pre-release** → click **Publish release** to approve
          - This will automatically trigger the database update
          
          ---
          *Automated CI/CD via GitHub Actions*" \
            --draft
          
          echo "✅ Draft release created. Waiting for admin to publish it."
