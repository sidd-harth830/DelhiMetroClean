name: Automated Cloud Deployment

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Updated to fix the Node 20 deprecation warning

      - name: Setup Java (Required for Android Build)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' # Safely caches gradle to speed up future builds

      - name: Install Project Dependencies
        run: npm install

      # Bypasses EAS and uses standard Expo native compilation
      - name: Generate Android Native Project
        run: npx expo prebuild --platform android --clean

      # The foolproof, standard way to build Android apps without hanging
      - name: Build Release APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Find and Rename APK
        id: apk-setup
        run: |
          # Grab the APK directly from the Gradle output folder
          APK_FILE="android/app/build/outputs/apk/release/app-release.apk"
          VERSION=$(node -p "require('./package.json').version")
          NEW_NAME="DelhiMetro-v${VERSION}.apk"
          mv $APK_FILE $NEW_NAME
          echo "apk_name=$NEW_NAME" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_ENV

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v${{ env.version }} "${{ env.apk_name }}" --title "Release v${{ env.version }}" --notes "Automated CI/CD Deployment"

      - name: Update Appwrite Database
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          node -e "
            const version = '${{ env.version }}';
            const apkName = '${{ env.apk_name }}';
            const repo = '${{ github.repository }}';
            const publicUrl = \`https://github.com/\${repo}/releases/download/v\${version}/\${apkName}\`;
            
            fetch('https://cloud.appwrite.io/v1/databases/6a2ce492003a18046d9b/collections/releases/documents', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-Appwrite-Project': 'sgp-6a2ce46a003230dcf661',
                'X-Appwrite-Key': process.env.APPWRITE_API_KEY
              },
              body: JSON.stringify({
                documentId: 'unique()',
                data: {
                  versionNumber: version,
                  isMandatory: true,
                  apkUrl: publicUrl,
                  status: 'released',
                  releaseDate: new Date().toISOString()
                }
              })
            }).then(async res => {
              if(!res.ok) throw new Error(await res.text());
              console.log('Appwrite Updated Successfully!');
            }).catch(err => {
              console.error(err);
              process.exit(1);
            });
          "